name: Build APK BaixeTube

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias do sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          git zip unzip \
          autoconf automake libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libffi-dev libssl-dev build-essential \
          ccache cmake

    - name: Instalar dependencias Python
      run: |
        pip install --upgrade pip
        pip install setuptools==68.0.0 wheel==0.38.4
        pip install cython==0.29.33
        pip install buildozer==1.5.0
        pip install python-for-android==2023.9.16

    - name: Corrigir sdkmanager e licencas
      run: |
        SDK=/usr/local/lib/android/sdk
        SDKMANAGER=$(find $SDK -name "sdkmanager" | head -1)
        echo "sdkmanager: $SDKMANAGER"
        sudo mkdir -p $SDK/tools/bin
        sudo ln -sf $SDKMANAGER $SDK/tools/bin/sdkmanager
        sudo mkdir -p $SDK/licenses
        printf "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" | sudo tee $SDK/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd" | sudo tee $SDK/licenses/android-sdk-preview-license
        yes | $SDKMANAGER --sdk_root=$SDK --licenses 2>/dev/null || true

    - name: Preparar buildozer.spec
      run: |
        SDK=/usr/local/lib/android/sdk
        NDK=$(ls -d $SDK/ndk/* | head -1)
        sed -i '/^android\.sdk_path/d' buildozer.spec
        sed -i '/^android\.ndk_path/d' buildozer.spec
        sed -i '/^android\.ndk /d' buildozer.spec
        sed -i "/^\[buildozer\]/i android.sdk_path = $SDK\nandroid.ndk_path = $NDK\n" buildozer.spec
        cat buildozer.spec

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: "0"
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      run: |
        buildozer -v android debug || true

    - name: Localizar e copiar APK
      if: always()
      run: |
        echo "=== Procurando APK ==="
        find . -name "*.apk" 2>/dev/null
        find ~/.buildozer -name "*.apk" 2>/dev/null

        # Copia APK para bin/ se estiver em outro lugar
        mkdir -p bin
        find ~/.buildozer -name "*.apk" 2>/dev/null | while read apk; do
          echo "Copiando: $apk"
          cp "$apk" bin/
        done

        echo "=== Conteudo bin/ ==="
        ls -la bin/

    - name: Publicar APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: BaixeTube-APK
        path: bin/*.apk
        if-no-files-found: warn
        retention-days: 7
